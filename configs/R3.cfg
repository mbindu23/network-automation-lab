! R3 - Area 1 router
! Only knows about Area 1 internally. Gets inter-area routes as Type 3 LSAs from R2.
!
hostname R3
!
username admin privilege 15 secret admin
!
interface Ethernet1
   description TO_R2_AREA1
   ip address 10.0.23.2/30
   no shutdown
!
interface Loopback0
   description ROUTER_ID
   ip address 3.3.3.3/32
   no shutdown
!
router ospf 1
   router-id 3.3.3.3
   network 10.0.23.0/30 area 0.0.0.1
   network 3.3.3.3/32 area 0.0.0.1
   passive-interface Loopback0
!
management ssh
   idle-timeout 30
   authentication mode password
!
management api http-commands
   protocol https
   no shutdown
!
end
