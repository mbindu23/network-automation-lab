! R1 - Area 0 router
!
hostname R1
!
! Management (ContainerLab auto-assigns Management0, we just set credentials)
username admin privilege 15 secret admin
!
interface Ethernet1
   description TO_R2
   ip address 10.0.12.1/30
   no shutdown
!
! Loopback = Router ID. Always configure a loopback for stable OSPF RID.
interface Loopback0
   description ROUTER_ID
   ip address 1.1.1.1/32
   no shutdown
!
router ospf 1
   router-id 1.1.1.1
   ! Area 0 = backbone area. All inter-area traffic must pass through it.
   network 10.0.12.0/30 area 0.0.0.0
   network 1.1.1.1/32 area 0.0.0.0
   ! Loopback interfaces default to /32 host routes. We want the full /32 advertised.
   passive-interface Loopback0
!
! Enable SSH so Python/Netmiko can connect
management ssh
   idle-timeout 30
   authentication mode password
!
! Allow API access (used later for automation)
management api http-commands
   protocol https
   no shutdown
!
end
