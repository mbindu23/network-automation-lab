! R2 - ABR (Area Border Router) connecting Area 0 and Area 1
! This is the most important router in your lab - it sits on TWO areas.
!
hostname R2
!
username admin privilege 15 secret admin
!
interface Ethernet1
   description TO_R1_AREA0
   ip address 10.0.12.2/30
   no shutdown
!
interface Ethernet2
   description TO_R3_AREA1
   ip address 10.0.23.1/30
   no shutdown
!
interface Loopback0
   description ROUTER_ID
   ip address 2.2.2.2/32
   no shutdown
!
router ospf 1
   router-id 2.2.2.2
   ! R2 has interfaces in BOTH areas - this makes it an ABR automatically.
   ! OSPF will generate Type 3 Summary LSAs to advertise routes between areas.
   network 10.0.12.0/30 area 0.0.0.0
   network 2.2.2.2/32 area 0.0.0.0
   network 10.0.23.0/30 area 0.0.0.1
   passive-interface Loopback0
!
management ssh
   idle-timeout 30
   authentication mode password
!
management api http-commands
   protocol https
   no shutdown
!
end
